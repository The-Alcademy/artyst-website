
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something's not right · The Artyst</title>
<meta name="description" content="We couldn't process that subscription request.">
<meta name="robots" content="noindex">
<style>
  :root {
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-faint: #6a6a6a;
    --paper: #fafaf8;
    --line: #e5e3dc;
    --accent: #1d5c5c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Charter", "Georgia", "Iowan Old Style", "Palatino Linotype", serif;
    line-height: 1.6;
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    padding: 2rem 1.25rem;
  }
  main {
    max-width: 520px;
    width: 100%;
    text-align: center;
  }
  .eyebrow {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: 2.5rem;
    line-height: 1.1;
    margin: 0 0 1rem;
    font-weight: 700;
    letter-spacing: -0.015em;
  }
  p { margin: 0 0 1rem; color: var(--ink-soft); font-size: 1.0625rem; }
  .cta {
    display: inline-block;
    margin-top: 1.5rem;
    padding: 0.75rem 1.5rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 0.9375rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: 0.02em;
  }
  .cta:hover { background: #164848; }
  .cta.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    margin-left: 0.5rem;
  }
  .cta.secondary:hover { background: var(--accent); color: #fff; }
  .reason-code {
    display: inline-block;
    margin-top: 1.5rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    font-size: 0.8125rem;
    color: var(--ink-faint);
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 0.25rem 0.5rem;
  }
  @media (max-width: 520px) {
    h1 { font-size: 2rem; }
    .cta.secondary { margin-left: 0; margin-top: 0.5rem; }
  }
</style>
</head>
<body>
<main>
  <div class="eyebrow">The Artyst</div>
  <h1 id="heading">Something's not right.</h1>
  <p id="body-text">We couldn't process that request.</p>
  <div id="actions">
    <a class="cta" href="https://theartyst.co.uk">Back to The Artyst</a>
    <a class="cta secondary" id="retry-link" href="mailto:privacy@othersyde.co.uk?subject=Subscription%20issue">Email us</a>
  </div>
  <div class="reason-code" id="reason-code" style="display:none"></div>
</main>

<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var reason = params.get('reason') || 'unknown';

  var messages = {
    missing_token: {
      heading: "Link incomplete",
      body: "The link you followed is missing its token. This usually happens if the URL got split across lines in the email — try copying and pasting it in full."
    },
    invalid_token: {
      heading: "Link not recognised",
      body: "The link you followed isn't one we recognise. It may have been modified in transit, or belong to an old email. If you'd like to subscribe afresh, please get in touch."
    },
    expired: {
      heading: "Link expired",
      body: "This confirmation link has expired. Links are valid for six weeks after they're issued. Drop us a line if you'd still like to subscribe — we can send a fresh one."
    },
    unsubscribed: {
      heading: "Already unsubscribed",
      body: "This email has previously been removed from our list. No further emails will be sent. If you'd like to re-subscribe, please get in touch."
    },
    invalid_state: {
      heading: "Something's not right",
      body: "Your subscription is in an unexpected state. This shouldn't normally happen — please email us and we'll sort it out."
    },
    server_error: {
      heading: "Temporary problem",
      body: "Something went wrong on our end. Please try the link again in a few minutes. If it keeps happening, email us and we'll help directly."
    },
    unknown: {
      heading: "Something's not right",
      body: "We couldn't process that request. Please email us and we'll sort it out."
    }
  };

  var message = messages[reason] || messages.unknown;
  document.getElementById('heading').textContent = message.heading;
  document.getElementById('body-text').textContent = message.body;

  var code = document.getElementById('reason-code');
  code.textContent = 'reason: ' + reason;
  code.style.display = 'inline-block';
})();
</script>
</body>
</html>
